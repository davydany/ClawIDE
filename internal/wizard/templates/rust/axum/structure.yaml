# Rust Axum project structure definition
# Directories are created in order, files are rendered from templates

directories:
  - src
  - src/handlers
  - src/models
  - tests
  - docs
  - docs/supporting
  - scripts

files:
  - path: .gitignore
    source: files/.gitignore
    type: static

  - path: README.md
    source: files/README.md.tmpl
    type: template

  - path: CLAUDE.md
    source: files/CLAUDE.md.tmpl
    type: template

  - path: docker-compose.yml
    source: files/docker-compose.yml.tmpl
    type: template

  - path: Dockerfile
    source: files/Dockerfile.tmpl
    type: template

  - path: Makefile
    source: files/Makefile.tmpl
    type: template

  - path: Cargo.toml
    source: files/Cargo.toml.tmpl
    type: template

  - path: src/main.rs
    source: files/main.rs.tmpl
    type: template

  - path: src/handlers/mod.rs
    source: files/handlers_mod.rs.tmpl
    type: template

  - path: src/handlers/health.rs
    source: files/health.rs.tmpl
    type: template

  - path: src/models/mod.rs
    source: files/models_mod.rs.tmpl
    type: template

  - path: .env.example
    source: files/env.example.tmpl
    type: template

  - path: scripts/setup.sh
    source: files/setup_script.sh.tmpl
    type: template

  # Supporting docs - only created if user provides them
  - path: docs/supporting/PRD.md
    type: supporting-doc
    condition: has_prd

  - path: docs/supporting/UI_UX_DESIGN.md
    type: supporting-doc
    condition: has_uiux

  - path: docs/supporting/ARCHITECTURE.md
    type: supporting-doc
    condition: has_architecture

  - path: docs/supporting/OTHER.md
    type: supporting-doc
    condition: has_other

post_create_commands:
  - name: Make setup script executable
    cmd: chmod +x scripts/setup.sh
    work_dir: .
    timeout: 30s
    critical: false

  - name: Initialize git
    cmd: git init
    work_dir: .
    timeout: 30s
    critical: true

  - name: Verify project compiles
    cmd: cargo check
    work_dir: .
    timeout: 300s
    critical: true

  - name: Initial commit
    cmd: git add -A && git commit -m 'Initial project setup from ClawIDE wizard'
    work_dir: .
    timeout: 30s
    critical: false
