directories:
  - public
  - src
  - src/components
  - src/pages
  - src/hooks
  - src/lib
  - src/types
  - src/assets
  - tests
  - docs/supporting

files:
  - path: .gitignore
    source: files/.gitignore
    type: static

  - path: package.json
    source: files/package.json.tmpl
    type: template

  - path: tsconfig.json
    source: files/tsconfig.json
    type: static

  - path: tsconfig.app.json
    source: files/tsconfig.app.json
    type: static

  - path: tsconfig.node.json
    source: files/tsconfig.node.json
    type: static

  - path: vite.config.ts
    source: files/vite.config.ts
    type: static

  - path: src/index.css
    source: files/tailwind.css
    type: static

  - path: docker-compose.yml
    source: files/docker-compose.yml.tmpl
    type: template

  - path: Dockerfile
    source: files/Dockerfile
    type: static

  - path: .dockerignore
    source: files/.dockerignore
    type: static

  - path: Makefile
    source: files/Makefile.tmpl
    type: template

  - path: .eslintrc.json
    source: files/.eslintrc.json
    type: static

  - path: .prettierrc
    source: files/.prettierrc
    type: static

  - path: index.html
    source: files/index.html.tmpl
    type: template

  - path: src/main.tsx
    source: files/src/main.tsx
    type: static

  - path: src/App.tsx
    source: files/src/App.tsx
    type: static

  - path: src/vite-env.d.ts
    source: files/src/vite-env.d.ts
    type: static

  - path: src/pages/Home.tsx
    source: files/src/pages/Home.tsx
    type: static

  - path: src/components/Layout.tsx
    source: files/src/components/Layout.tsx
    type: static

  - path: tests/App.test.tsx
    source: files/tests/App.test.tsx
    type: static

  - path: README.md
    source: files/README.md.tmpl
    type: template

  - path: CLAUDE.md
    source: files/CLAUDE.md.tmpl
    type: template

  # Supporting docs - only created if user provides them
  - path: docs/supporting/PRD.md
    type: supporting-doc
    condition: has_prd

  - path: docs/supporting/UI_UX_DESIGN.md
    type: supporting-doc
    condition: has_uiux

  - path: docs/supporting/ARCHITECTURE.md
    type: supporting-doc
    condition: has_architecture

  - path: docs/supporting/OTHER.md
    type: supporting-doc
    condition: has_other

post_create_commands:
  - name: Install dependencies
    cmd: npm install
    work_dir: .
    timeout: 120s
    critical: true

  - name: Initialize git
    cmd: git init
    work_dir: .
    timeout: 30s
    critical: true

  - name: Stage all files
    cmd: git add -A
    work_dir: .
    timeout: 30s
    critical: true

  - name: Initial commit
    cmd: git commit -m "Initial commit"
    work_dir: .
    timeout: 30s
    critical: true
