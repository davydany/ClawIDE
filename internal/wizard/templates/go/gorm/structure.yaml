directories:
  - cmd/server
  - cmd/migrate
  - internal/models
  - internal/repository
  - internal/config
  - internal/database
  - migrations
  - pkg
  - docs/supporting
  - scripts

files:
  - path: .gitignore
    source: files/.gitignore
    type: static

  - path: go.mod
    source: files/go.mod.tmpl
    type: template

  - path: cmd/server/main.go
    source: files/main.go.tmpl
    type: template

  - path: cmd/migrate/main.go
    source: files/migrate.go.tmpl
    type: template

  - path: internal/config/config.go
    source: files/config.go.tmpl
    type: template

  - path: internal/database/database.go
    source: files/database.go.tmpl
    type: template

  - path: internal/models/user.go
    source: files/user.go.tmpl
    type: template

  - path: internal/models/post.go
    source: files/post.go.tmpl
    type: template

  - path: internal/repository/user_repository.go
    source: files/user_repository.go.tmpl
    type: template

  - path: internal/repository/post_repository.go
    source: files/post_repository.go.tmpl
    type: template

  - path: migrations/001_create_users.sql
    source: files/001_create_users.sql.tmpl
    type: template

  - path: migrations/002_create_posts.sql
    source: files/002_create_posts.sql.tmpl
    type: template

  - path: scripts/setup.sh
    source: files/setup.sh.tmpl
    type: template

  - path: docker-compose.yml
    source: files/docker-compose.yml.tmpl
    type: template

  - path: Makefile
    source: files/Makefile.tmpl
    type: template

  - path: README.md
    source: files/README.md.tmpl
    type: template

  - path: CLAUDE.md
    source: files/CLAUDE.md.tmpl
    type: template

  - path: docs/supporting/PRD.md
    type: supporting-doc
    condition: has_prd

  - path: docs/supporting/UI_UX_DESIGN.md
    type: supporting-doc
    condition: has_uiux

  - path: docs/supporting/ARCHITECTURE.md
    type: supporting-doc
    condition: has_architecture

  - path: docs/supporting/OTHER.md
    type: supporting-doc
    condition: has_other

post_create_commands:
  - name: Download Go dependencies
    cmd: go mod tidy
    work_dir: .
    timeout: 120s
    critical: true

  - name: Make setup script executable
    cmd: chmod +x scripts/setup.sh
    work_dir: .
    timeout: 10s
    critical: false

  - name: Initialize git
    cmd: git init
    work_dir: .
    timeout: 30s
    critical: true

  - name: Stage all files
    cmd: git add -A
    work_dir: .
    timeout: 30s
    critical: true

  - name: Initial commit
    cmd: "git commit -m 'Initial commit: GORM project scaffolded by ClawIDE'"
    work_dir: .
    timeout: 30s
    critical: true
