<!DOCTYPE html>
<html lang="en" class="h-full bg-surface-deepest" style="height:100dvh"{{if and .Theme (ne .Theme "default")}} data-theme="{{.Theme}}"{{end}}{{if and .Mode (ne .Mode "") (ne .Mode "dark")}} data-mode="{{.Mode}}"{{end}}>
<head>
    <script>
    // Prevent FOUC: apply theme from localStorage before CSS loads
    (function(){var t=localStorage.getItem('clawide-theme');if(t&&t!=='default')document.documentElement.dataset.theme=t;var m=localStorage.getItem('clawide-mode');if(m&&m!=='dark')document.documentElement.dataset.mode=m;})();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>{{block "title" .}}ClawIDE{{end}}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
    <link rel="alternate icon" href="/static/favicon.ico">

    <!-- Tailwind compiled CSS -->
    <link rel="stylesheet" href="/static/dist/app.css">

    <!-- Vendored JS -->
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/qrcode.min.js"></script>
    <script src="/static/vendor/alpine.min.js" defer></script>

    <!-- Markdown / Mermaid / Highlight CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/notifications.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/modal-dialog.js"></script>
    <script src="/static/js/project-actions.js"></script>
    <script src="/static/js/trash.js"></script>
    <script src="/static/js/folder-tree.js"></script>
    <script src="/static/js/markdown-preview.js"></script>
    <script src="/static/js/clawide-git.js"></script>
    <script src="/static/js/notes-manager.js"></script>
    <script src="/static/js/bookmarks-manager.js"></script>
    <script src="/static/js/tasks.js"></script>
    <script src="/static/js/system-stats.js"></script>
    <script src="/static/js/update-check.js"></script>
    <script src="/static/js/color-utils.js"></script>
    {{block "head" .}}{{end}}
</head>
<body class="h-full text-th-text-secondary antialiased" style="height:100dvh" hx-boost="true">
    {{block "body" .}}{{end}}

    {{block "scripts" .}}{{end}}
</body>
</html>
