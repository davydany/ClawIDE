<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950" style="height:100dvh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>{{block "title" .}}ClawIDE{{end}}</title>

    <!-- Tailwind compiled CSS -->
    <link rel="stylesheet" href="/static/dist/app.css">

    <!-- Vendored JS -->
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/qrcode.min.js"></script>
    <script src="/static/vendor/alpine.min.js" defer></script>

    <!-- Markdown / Mermaid / Highlight CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <script src="/static/js/notifications.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/modal-dialog.js"></script>
    <script src="/static/js/folder-tree.js"></script>
    <script src="/static/js/markdown-preview.js"></script>
    <script src="/static/js/clawide-git.js"></script>
    <script src="/static/js/notes-manager.js"></script>
    <script src="/static/js/bookmarks-manager.js"></script>
    <script src="/static/js/system-stats.js"></script>
    <script src="/static/js/update-check.js"></script>
    {{block "head" .}}{{end}}
</head>
<body class="h-full text-gray-100 antialiased" style="height:100dvh" hx-boost="true">
    {{block "body" .}}{{end}}

    {{block "scripts" .}}{{end}}
</body>
</html>
